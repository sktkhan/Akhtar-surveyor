<!DOCTYPE html>
<html>
<head>
    <title>Akhtar Surveyor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav>
    <h2>Akhtar Surveyor</h2>
    <ul>
        <li>Home</li>
        <li><a href="#tools">Tools</a></li>
        <li>Articles</li>
        <li>Contact</li>
    </ul>
</nav>

<!-- HERO -->
<header>
    <h1>Engineering Surveyor Guide</h1>
    <p>Tools, Calculations & Real Solutions</p>
</header>

<main>

<section id="tools">
    <h2>Survey Tools</h2>

    <section id="tools">
    <h2>Survey Tools</h2>

    <div class="tools-container">

        <!-- RL TOOL -->
        <div class="tool-box">
            ...
        </div>

        <!-- SLOPE TOOL -->
        <div class="tool-box">
            ...
        </div>

    </div>
    </section>

    <!-- RL TOOL -->
    <div class="tool-box">
        <h3>RL Calculator</h3>

        <input type="number" id="bm" placeholder="BM">
        <input type="number" id="bs" placeholder="BS">
        <input type="number" id="fs" placeholder="FS">

        <button onclick="calculateRL()">Calculate</button>

        <p id="result"></p>
    </div>

    <!-- SLOPE TOOL -->
    <div class="tool-box">
        <h3>Slope Calculator</h3>

        <input type="number" id="rise" placeholder="Rise">
        <input type="number" id="distance" placeholder="Distance">

        <button onclick="calculateSlope()">Calculate</button>

        <p id="slopeResult"></p>
    </div>

</section>

<section id="articles">
    <h2>Articles</h2>
    <p>Articles coming soon...</p>
</section>

</main>

<script>
function calculateRL() {
    let bm = parseFloat(document.getElementById("bm").value);
    let bs = parseFloat(document.getElementById("bs").value);
    let fs = parseFloat(document.getElementById("fs").value);

    let hi = bm + bs;
    let rl = hi - fs;

    document.getElementById("result").innerText =
        "HI: " + hi + " | RL: " + rl;
}

function calculateSlope() {
    let rise = document.getElementById("rise").value;
    let distance = document.getElementById("distance").value;

    let slope = rise / distance;

    document.getElementById("slopeResult").innerText =
        "Slope: " + slope;
}
</script>

</body>
</html>
